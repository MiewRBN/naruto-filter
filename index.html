<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jutsu Hand Sign Effect</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: sans-serif;
        }

        /* Mirroring webcam and canvas */
        .mirror {
            transform: scaleX(-1);
        }

        video#input_video, canvas#output_canvas {
            position: absolute;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            top: 0;
            left: 0;
        }

        /* Overlay Darkness */
        .darkness {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 5, 0, 0.3);
            mix-blend-mode: multiply;
            pointer-events: none;
            z-index: 5;
        }

        /* Jutsu Video Effects */
        .jutsu-video {
            position: absolute;
            display: none;
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
        }

        #n { width: 1600px; max-width: 300vw; } /* Naruto Jutsu */
        #s { width: 2400px; max-width: 400vw; } /* Sasuke Jutsu */

        .status-ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #00d4ff;
            z-index: 20;
            text-shadow: 0 0 10px #000;
        }

        /* Start Screen untuk Bypass Keamanan Autoplay HP */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #start-btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px #00d4ff;
        }
    </style>
</head>
<body>

    <!-- Start Screen -->
    <div id="start-screen">
        <h2>Efek Jutsu Deteksi Tangan</h2>
        <p>Aplikasi ini membutuhkan akses kamera. Ketuk "Mulai" agar video efek dapat berjalan di HP Anda.</p>
        <button id="start-btn">Mulai Jutsu</button>
    </div>

    <video id="input_video" class="mirror" playsinline></video>
    <canvas id="output_canvas" class="mirror"></canvas>
    <div class="darkness"></div>

    <!-- Video Assets -->
    <!-- playsinline dan preload sangat penting untuk Mobile -->
    <video id="n" class="jutsu-video" src="assets/naruto.mp4" loop muted playsinline preload="auto"></video>
    <video id="s" class="jutsu-video" src="assets/sasuke.mp4" loop muted playsinline preload="auto"></video>

    <div class="status-ui">Status: Menunggu Interaksi...</div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusUi = document.querySelector('.status-ui');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        
        const videoN = document.getElementById('n');
        const videoS = document.getElementById('s');

        // State Power (pwr) untuk transisi halus: [0] Kiri, [1] Kanan
        let pwr = [0, 0];
        let wasOpen = [false, false];

        // Trik Bypass Autoplay Mobile
        startBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            statusUi.innerText = "Memulai Kamera...";

            // Memancing pemutaran video agar diizinkan oleh browser HP
            try {
                let playN = videoN.play();
                if (playN !== undefined) playN.then(() => videoN.pause()).catch(e => console.log(e));
                
                let playS = videoS.play();
                if (playS !== undefined) playS.then(() => videoS.pause()).catch(e => console.log(e));
            } catch (err) {
                console.warn("Autoplay unlock failed", err);
            }

            // Mulai kamera setelah interaksi sentuhan
            camera.start();
        });

        /**
         * Logika Deteksi Jari Terbuka (checkOpen)
         * Membandingkan jarak tips ke wrist vs pips ke wrist
         */
        function checkOpen(landmarks) {
            const wrist = landmarks[0];
            const tips = [8, 12, 16, 20];
            const pips = [6, 10, 14, 18];
            
            let openCount = 0;
            for (let i = 0; i < 4; i++) {
                const distTip = Math.hypot(landmarks[tips[i]].x - wrist.x, landmarks[tips[i]].y - wrist.y);
                const distPip = Math.hypot(landmarks[pips[i]].x - wrist.x, landmarks[pips[i]].y - wrist.y);
                if (distTip > distPip) openCount++;
            }
            return openCount >= 3;
        }

        function onResults(results) {
            // Resize canvas to window size
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            let activeHands = { 'Left': false, 'Right': false };

            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let index = 0; index < results.multiHandLandmarks.length; index++) {
                    const landmarks = results.multiHandLandmarks[index];
                    const classification = results.multiHandedness[index];
                    const label = classification.label; // 'Left' atau 'Right'
                    const pIdx = label === 'Left' ? 0 : 1;
                    const targetVideo = label === 'Left' ? videoN : videoS;

                    activeHands[label] = true;

                    // 1. Cek status buka/tutup
                    const isOpen = checkOpen(landmarks);

                    // 2. Animasi Transisi Halus (pwr)
                    if (isOpen) {
                        if (!wasOpen[pIdx]) {
                            // Tangan baru saja terbuka
                            targetVideo.currentTime = 0;
                            let playPromise = targetVideo.play();
                            if (playPromise !== undefined) {
                                playPromise.catch(error => console.warn("Auto-play dicegah:", error));
                            }
                            wasOpen[pIdx] = true;
                        }
                        pwr[pIdx] = Math.min(1, pwr[pIdx] + 0.05);
                    } else {
                        pwr[pIdx] = Math.max(0, pwr[pIdx] - 0.15);
                        wasOpen[pIdx] = false;
                    }

                    // 3. Logika Visual Skeleton
                    canvasCtx.shadowBlur = 10;
                    canvasCtx.shadowColor = '#00fbff';
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00d4ff', lineWidth: 3});
                    drawLandmarks(canvasCtx, landmarks, {color: '#FFFFFF', lineWidth: 1, radius: 2});
                    canvasCtx.shadowBlur = 0;

                    // 4. Logika Posisi Video MENGIKUTI TANGAN
                    if (pwr[pIdx] > 0.01) {
                        targetVideo.style.display = 'block';
                        targetVideo.style.opacity = pwr[pIdx];

                        const wrist = landmarks[0];
                        const knuckle = landmarks[9]; // Middle finger knuckle

                        let tx, ty;

                        if (label === 'Right') {
                            // Sasuke Effect (S): Titik tengah wrist & knuckle
                            tx = (wrist.x + knuckle.x) / 2;
                            ty = (wrist.y + knuckle.y) / 2;
                            
                            targetVideo.style.left = (1 - tx) * window.innerWidth + 'px';
                            targetVideo.style.top = ty * window.innerHeight + 'px';
                        } else {
                            // Naruto Effect (N): Vektor wrist ke knuckle + offset
                            const dx = knuckle.x - wrist.x;
                            const dy = knuckle.y - wrist.y;
                            
                            tx = knuckle.x + (dx * 0.8);
                            ty = knuckle.y + (dy * 0.8);

                            targetVideo.style.left = (1 - tx) * window.innerWidth + 'px';
                            targetVideo.style.top = (ty * window.innerHeight - 120) + 'px';
                        }
                    } else {
                        targetVideo.style.display = 'none';
                    }
                }
            }

            // Cleanup pwr untuk tangan yang tidak terdeteksi
            if (!activeHands['Left']) {
                pwr[0] = Math.max(0, pwr[0] - 0.15);
                if (pwr[0] <= 0) { videoN.style.display = 'none'; wasOpen[0] = false; }
            }
            if (!activeHands['Right']) {
                pwr[1] = Math.max(0, pwr[1] - 0.15);
                if (pwr[1] <= 0) { videoS.style.display = 'none'; wasOpen[1] = false; }
            }

            canvasCtx.restore();
            statusUi.innerText = "Sistem Aktif - Buka telapak tangan Anda";
        }

        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        });
    </script>
</body>
</html>
